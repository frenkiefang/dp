<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#09090B">
    <title>数据管理 — 积分看板</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.0/dist/umd/supabase.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        'sans': ['Inter', 'system-ui', '-apple-system', 'sans-serif'],
                        'mono': ['JetBrains Mono', 'Menlo', 'Consolas', 'monospace'],
                    },
                }
            }
        }
    </script>

    <style>
        :root {
            --bg-primary: #09090B;
            --bg-card: #18181B;
            --border: #27272A;
            --text-primary: #FAFAFA;
            --text-secondary: #A1A1AA;
            --text-muted: #71717A;
        }

        * { -webkit-tap-highlight-color: transparent; }
        html, body {
            height: 100%; overflow-x: hidden;
            background: var(--bg-primary);
            color: var(--text-primary);
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            -webkit-font-smoothing: antialiased;
        }
        ::-webkit-scrollbar { width: 0; height: 0; }
        body { scrollbar-width: none; }

        .toast {
            position: fixed; top: 16px; left: 50%;
            transform: translateX(-50%) translateY(-120px);
            z-index: 100; padding: 12px 20px; border-radius: 12px;
            font-size: 14px; font-weight: 500; max-width: 380px; width: 90%; text-align: center;
            transition: transform 300ms cubic-bezier(0.32, 0.72, 0, 1);
        }
        .toast.show { transform: translateX(-50%) translateY(0); }
        .toast.success { background: #0A2E1F; color: #A7F3D0; border: 1px solid #14532D; }
        .toast.error { background: #3B0A0A; color: #FECACA; border: 1px solid #7F1D1D; }

        .dialog-overlay {
            position: fixed; inset: 0; z-index: 60;
            background: rgba(0,0,0,0.6);
            display: flex; align-items: center; justify-content: center;
            opacity: 0; pointer-events: none;
            transition: opacity 200ms ease;
        }
        .dialog-overlay.open { opacity: 1; pointer-events: auto; }
        .dialog-box {
            background: var(--bg-card); border: 1px solid var(--border);
            border-radius: 16px; padding: 24px; max-width: 340px; width: 90%; text-align: center;
        }
    </style>
</head>
<body class="flex justify-center min-h-screen">

    <main class="w-full max-w-lg px-4 pt-4 pb-8">

        <!-- ═══════════ LOGIN VIEW ═══════════ -->
        <div id="login-view">
            <div class="text-center mt-16 mb-8">
                <div class="inline-flex items-center justify-center w-16 h-16 rounded-2xl bg-zinc-800 mb-4">
                    <i class="fa-solid fa-lock text-2xl text-zinc-400"></i>
                </div>
                <h1 class="text-xl font-semibold text-zinc-100">管理员登录</h1>
                <p class="text-xs text-zinc-500 mt-1">登录后方可录入、编辑数据</p>
            </div>

            <div class="bg-zinc-900 border border-zinc-800 rounded-2xl p-5 max-w-sm mx-auto">
                <label class="text-xs text-zinc-500 block mb-1.5">邮箱</label>
                <input type="email" id="login-email" placeholder="admin@example.com"
                    class="w-full bg-zinc-950 border border-zinc-800 rounded-xl px-4 py-3 text-sm text-zinc-200 mb-4
                           focus:outline-none focus:border-zinc-600 transition-colors">

                <label class="text-xs text-zinc-500 block mb-1.5">密码</label>
                <input type="password" id="login-password" placeholder="········"
                    class="w-full bg-zinc-950 border border-zinc-800 rounded-xl px-4 py-3 text-sm text-zinc-200 mb-5
                           focus:outline-none focus:border-zinc-600 transition-colors">

                <button id="login-btn"
                    class="w-full py-3 bg-zinc-100 hover:bg-zinc-200 active:bg-zinc-300 text-zinc-900 rounded-xl text-sm font-semibold transition-colors">
                    <i class="fa-solid fa-right-to-bracket mr-1.5"></i>登录
                </button>
                <p id="login-error" class="text-xs text-red-400 text-center mt-3 hidden"></p>
            </div>

            <p class="text-xs text-zinc-600 text-center mt-6 max-w-sm mx-auto leading-relaxed">
                在 Supabase Dashboard → Authentication → Users 中创建管理员账号，然后用该邮箱和密码登录。
            </p>
        </div>

        <!-- ═══════════ ADMIN VIEW (hidden until login) ═══════════ -->
        <div id="admin-view" class="hidden">

            <!-- Header -->
            <header class="flex items-center justify-between mb-5">
                <div>
                    <h1 class="text-lg font-semibold tracking-tight text-zinc-100">
                        <i class="fa-solid fa-pen-to-square mr-2 text-zinc-500" style="font-size:15px;"></i>数据管理
                    </h1>
                    <p class="text-xs text-zinc-500 mt-0.5">
                        <span id="login-user" class="text-zinc-400"></span>
                    </p>
                </div>
                <div class="flex items-center gap-3">
                    <a href="./index.html" class="text-xs text-zinc-500 hover:text-zinc-300 transition-colors">
                        <i class="fa-solid fa-arrow-left"></i>看板
                    </a>
                    <button id="logout-btn" class="text-xs text-zinc-500 hover:text-red-400 transition-colors">
                        <i class="fa-solid fa-right-from-bracket"></i>
                    </button>
                </div>
            </header>

            <!-- ── Entry Form ── -->
            <section class="mb-5">
                <div class="bg-zinc-900 border border-zinc-800 rounded-2xl p-4">
                    <p class="text-xs font-medium text-zinc-500 uppercase tracking-widest mb-4">
                        <i class="fa-solid fa-upload mr-1.5"></i>录入数据
                    </p>

                    <div class="mb-4">
                        <label class="text-xs text-zinc-500 block mb-1.5">日期</label>
                        <input type="date" id="entry-date"
                            class="w-full bg-zinc-950 border border-zinc-800 rounded-xl px-4 py-2.5 text-sm text-zinc-200
                                   focus:outline-none focus:border-zinc-600 transition-colors [color-scheme:dark]">
                    </div>

                    <div id="player-rows" class="space-y-2 mb-3"></div>

                    <button id="add-player-btn"
                        class="w-full py-2.5 border border-dashed border-zinc-700 rounded-xl text-xs text-zinc-500
                               hover:text-zinc-300 hover:border-zinc-500 active:bg-zinc-800 transition-all mb-4">
                        <i class="fa-solid fa-plus mr-1.5"></i>添加选手
                    </button>

                    <button id="submit-btn"
                        class="w-full py-3 bg-zinc-100 hover:bg-zinc-200 active:bg-zinc-300 text-zinc-900
                               rounded-xl text-sm font-semibold transition-colors">
                        <i class="fa-solid fa-check mr-1.5"></i>一键提交
                    </button>
                    <p id="submit-hint" class="text-xs text-zinc-600 text-center mt-2 hidden"></p>
                </div>
            </section>

            <!-- ── Recent Records ── -->
            <section class="mb-6">
                <div class="bg-zinc-900 border border-zinc-800 rounded-2xl overflow-hidden">
                    <div class="px-4 py-3.5 border-b border-zinc-800 flex items-center justify-between">
                        <p class="text-xs font-medium text-zinc-500 uppercase tracking-widest">
                            <i class="fa-solid fa-clock-rotate-left mr-1.5"></i>近期记录
                        </p>
                        <span id="record-count" class="text-xs text-zinc-600"></span>
                    </div>
                    <div id="records-loading" class="px-4 py-6 space-y-3">
                        <div class="h-12 rounded-lg bg-zinc-800/50 animate-pulse"></div>
                        <div class="h-12 rounded-lg bg-zinc-800/50 animate-pulse"></div>
                        <div class="h-12 rounded-lg bg-zinc-800/50 animate-pulse"></div>
                    </div>
                    <div id="records-empty" class="hidden px-4 py-10 text-center">
                        <i class="fa-regular fa-clipboard text-2xl text-zinc-700 mb-2 block"></i>
                        <p class="text-sm text-zinc-500">暂无记录</p>
                    </div>
                    <div id="records-list" class="hidden"></div>
                </div>
            </section>

            <footer class="text-center text-xs text-zinc-700 pb-4">
                Powered by Supabase · 积分看板
            </footer>
        </div>
    </main>

    <!-- Confirm Dialog -->
    <div id="confirm-dialog" class="dialog-overlay">
        <div class="dialog-box">
            <p class="text-sm text-zinc-200 mb-2 font-medium">确认删除</p>
            <p id="confirm-msg" class="text-xs text-zinc-400 mb-5"></p>
            <div class="flex gap-3">
                <button id="confirm-cancel" class="flex-1 py-2.5 bg-zinc-800 hover:bg-zinc-700 text-zinc-300 rounded-xl text-sm font-medium transition-colors">取消</button>
                <button id="confirm-ok" class="flex-1 py-2.5 bg-red-600 hover:bg-red-500 text-white rounded-xl text-sm font-medium transition-colors">删除</button>
            </div>
        </div>
    </div>

    <!-- Toast -->
    <div id="toast" class="toast"></div>

    <script>
    (function() {
        // ── CONFIG ──
        const SUPABASE_URL = 'https://bpippqhzpfmdcuwfswfr.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_Q2SQy1RS8vk5ek-rZJTCkA_qFcp1kl3';
        const TABLE_NAME = 'dp_database';

        // ── STATE ──
        let supabase = null;
        let allRecords = [];
        let pendingDeleteId = null;

        // ── DOM ──
        const $ = (sel) => document.querySelector(sel);
        const domLoginView = $('#login-view');
        const domAdminView = $('#admin-view');
        const domLoginEmail = $('#login-email');
        const domLoginPassword = $('#login-password');
        const domLoginBtn = $('#login-btn');
        const domLoginError = $('#login-error');
        const domLoginUser = $('#login-user');
        const domLogoutBtn = $('#logout-btn');
        const domEntryDate = $('#entry-date');
        const domPlayerRows = $('#player-rows');
        const domAddPlayerBtn = $('#add-player-btn');
        const domSubmitBtn = $('#submit-btn');
        const domRecordsLoading = $('#records-loading');
        const domRecordsEmpty = $('#records-empty');
        const domRecordsList = $('#records-list');
        const domRecordCount = $('#record-count');
        const domConfirmDialog = $('#confirm-dialog');
        const domConfirmMsg = $('#confirm-msg');
        const domConfirmCancel = $('#confirm-cancel');
        const domConfirmOk = $('#confirm-ok');
        const domToast = $('#toast');

        // ── Toast ──
        let toastTimer = null;
        function showToast(msg, type = 'success') {
            if (toastTimer) clearTimeout(toastTimer);
            domToast.className = `toast ${type}`;
            domToast.textContent = msg;
            void domToast.offsetWidth;
            domToast.classList.add('show');
            toastTimer = setTimeout(() => domToast.classList.remove('show'), 3000);
        }

        // ── Supabase Init ──
        function initSupabase() {
            supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        }

        // ── Auth ──
        domLoginBtn.addEventListener('click', async () => {
            const email = domLoginEmail.value.trim();
            const password = domLoginPassword.value;
            if (!email || !password) {
                domLoginError.textContent = '请填写邮箱和密码';
                domLoginError.classList.remove('hidden');
                return;
            }

            domLoginBtn.disabled = true;
            domLoginBtn.innerHTML = '<i class="fa-solid fa-spinner fa-spin mr-1.5"></i>登录中...';
            domLoginError.classList.add('hidden');

            const { data, error } = await supabase.auth.signInWithPassword({ email, password });
            domLoginBtn.disabled = false;
            domLoginBtn.innerHTML = '<i class="fa-solid fa-right-to-bracket mr-1.5"></i>登录';

            if (error) {
                domLoginError.textContent = error.message === 'Invalid login credentials'
                    ? '邮箱或密码错误'
                    : error.message;
                domLoginError.classList.remove('hidden');
                return;
            }

            showAdminView(data.user);
        });

        domLogoutBtn.addEventListener('click', async () => {
            await supabase.auth.signOut();
            showLoginView();
        });

        function showLoginView() {
            domLoginView.classList.remove('hidden');
            domAdminView.classList.add('hidden');
            domLoginEmail.value = '';
            domLoginPassword.value = '';
        }

        function showAdminView(user) {
            domLoginView.classList.add('hidden');
            domAdminView.classList.remove('hidden');
            domLoginUser.textContent = user.email;
            initAdminPanel();
        }

        // ── Admin Panel Init ──
        async function initAdminPanel() {
            const today = new Date();
            const y = today.getFullYear();
            const m = String(today.getMonth() + 1).padStart(2, '0');
            const d = String(today.getDate()).padStart(2, '0');
            domEntryDate.value = `${y}-${m}-${d}`;

            // Default 6 empty rows
            domPlayerRows.innerHTML = '';
            for (let i = 0; i < 6; i++) {
                domPlayerRows.appendChild(createPlayerRow());
            }

            domRecordsLoading.classList.remove('hidden');
            domRecordsEmpty.classList.add('hidden');
            domRecordsList.classList.add('hidden');

            await fetchRecords();
        }

        // ── Fetch Records ──
        async function fetchRecords() {
            try {
                const { data, error } = await supabase
                    .from(TABLE_NAME)
                    .select('*')
                    .order('play_date', { ascending: false })
                    .order('id', { ascending: false })
                    .limit(50);

                if (error) throw error;
                allRecords = data || [];
                renderRecords();
            } catch(e) {
                console.error(e);
                showToast('加载记录失败: ' + (e.message || '网络错误'), 'error');
                allRecords = [];
                renderRecords();
            }
        }

        function renderRecords() {
            domRecordsLoading.classList.add('hidden');

            if (allRecords.length === 0) {
                domRecordsEmpty.classList.remove('hidden');
                domRecordsList.classList.add('hidden');
                domRecordCount.textContent = '';
                return;
            }

            domRecordsEmpty.classList.add('hidden');
            domRecordsList.classList.remove('hidden');
            domRecordCount.textContent = `最近 ${allRecords.length} 条`;

            domRecordsList.innerHTML = allRecords.map(r => {
                const dateStr = r.play_date || '';
                const val = parseFloat(r.value) || 0;
                const colorClass = val >= 0 ? 'text-emerald-400' : 'text-red-400';
                const sign = val >= 0 ? '+' : '';
                return `
                <div class="flex items-center gap-3 px-4 py-3 border-b border-zinc-800/50 text-sm group" id="row-${r.id}">
                    <span class="text-xs text-zinc-600 w-20 shrink-0 font-mono">${dateStr}</span>
                    <span class="text-zinc-200 font-medium truncate flex-1 min-w-0">${escHtml(r.player)}</span>
                    <span class="font-mono font-semibold shrink-0 text-right w-20 ${colorClass}" id="val-${r.id}">${sign}${val}分</span>
                    <span class="shrink-0 flex gap-1 opacity-0 group-hover:opacity-100 transition-opacity">
                        <button onclick="window.__editRecord(${r.id})" class="w-7 h-7 flex items-center justify-center rounded-lg bg-zinc-800 hover:bg-zinc-700 text-zinc-400 hover:text-zinc-200 transition-colors" title="编辑">
                            <i class="fa-solid fa-pen text-xs"></i>
                        </button>
                        <button onclick="window.__askDelete(${r.id})" class="w-7 h-7 flex items-center justify-center rounded-lg bg-zinc-800 hover:bg-red-900 text-zinc-400 hover:text-red-400 transition-colors" title="删除">
                            <i class="fa-solid fa-trash text-xs"></i>
                        </button>
                    </span>
                </div>`;
            }).join('');
        }

        // ── Edit ──
        window.__editRecord = async function(id) {
            const record = allRecords.find(r => r.id === id);
            if (!record) return;
            const valEl = document.getElementById('val-' + id);
            if (!valEl) return;

            const currentVal = parseFloat(record.value) || 0;
            valEl.innerHTML = `<input type="number" id="edit-input-${id}" value="${currentVal}"
                class="w-20 bg-zinc-800 border border-zinc-600 rounded-lg px-2 py-1 text-sm font-mono text-zinc-200 text-right
                       focus:outline-none focus:border-zinc-400 [-moz-appearance:textfield] [&::-webkit-outer-spin-button]:appearance-none [&::-webkit-inner-spin-button]:appearance-none"
                autofocus>`;

            const input = document.getElementById('edit-input-' + id);
            input.focus();
            input.select();

            const save = async () => {
                const newVal = parseFloat(input.value);
                if (isNaN(newVal)) { showToast('请输入有效数字', 'error'); return; }
                const { error } = await supabase.from(TABLE_NAME).update({ value: newVal }).eq('id', id);
                if (error) { showToast('更新失败: ' + error.message, 'error'); return; }
                record.value = newVal;
                renderRecords();
                showToast('已更新');
            };

            input.addEventListener('blur', save);
            input.addEventListener('keydown', (e) => { if (e.key === 'Enter') input.blur(); });
        };

        // ── Delete ──
        window.__askDelete = function(id) {
            const record = allRecords.find(r => r.id === id);
            if (!record) return;
            pendingDeleteId = id;
            domConfirmMsg.textContent = `${record.play_date} · ${record.player} · ${record.value}分`;
            domConfirmDialog.classList.add('open');
        };

        domConfirmCancel.addEventListener('click', () => {
            domConfirmDialog.classList.remove('open');
            pendingDeleteId = null;
        });

        domConfirmOk.addEventListener('click', async () => {
            if (!pendingDeleteId) return;
            const id = pendingDeleteId;
            domConfirmDialog.classList.remove('open');
            pendingDeleteId = null;

            const { error } = await supabase.from(TABLE_NAME).delete().eq('id', id);
            if (error) { showToast('删除失败: ' + error.message, 'error'); return; }
            allRecords = allRecords.filter(r => r.id !== id);
            renderRecords();
            showToast('已删除');
        });

        // ── Player Rows ──
        function createPlayerRow(name = '', value = '') {
            const div = document.createElement('div');
            div.className = 'flex items-center gap-2';
            div.innerHTML = `
                <input type="text" placeholder="选手名" value="${escHtml(name)}"
                    class="player-name flex-1 min-w-0 bg-zinc-950 border border-zinc-800 rounded-xl px-4 py-2.5 text-sm text-zinc-200
                           focus:outline-none focus:border-zinc-600 transition-colors">
                <input type="number" placeholder="积分" value="${escHtml(value)}"
                    class="player-value w-24 shrink-0 bg-zinc-950 border border-zinc-800 rounded-xl px-4 py-2.5 text-sm text-zinc-200 text-right font-mono
                           focus:outline-none focus:border-zinc-600 transition-colors [-moz-appearance:textfield] [&::-webkit-outer-spin-button]:appearance-none [&::-webkit-inner-spin-button]:appearance-none">
                <button class="remove-row-btn shrink-0 w-9 h-9 flex items-center justify-center rounded-lg text-zinc-600 hover:text-red-400 hover:bg-red-950/30 transition-colors" title="移除">
                    <i class="fa-solid fa-xmark text-sm"></i>
                </button>`;
            div.querySelector('.remove-row-btn').addEventListener('click', () => div.remove());
            return div;
        }

        function getPlayerRows() {
            const rows = [];
            domPlayerRows.querySelectorAll('.player-name').forEach((nameEl, i) => {
                const valEl = domPlayerRows.querySelectorAll('.player-value')[i];
                const name = (nameEl.value || '').trim();
                const valStr = (valEl.value || '').trim();
                if (name || valStr) {
                    rows.push({ name, value: parseFloat(valStr) });
                }
            });
            return rows;
        }

        domAddPlayerBtn.addEventListener('click', () => {
            domPlayerRows.appendChild(createPlayerRow());
            const names = domPlayerRows.querySelectorAll('.player-name');
            if (names.length > 0) names[names.length - 1].focus();
        });

        // ── Submit ──
        domSubmitBtn.addEventListener('click', async () => {
            const dateVal = domEntryDate.value;
            if (!dateVal) { showToast('请选择日期', 'error'); return; }

            const rows = getPlayerRows();
            if (rows.length === 0) { showToast('请至少添加一位选手', 'error'); return; }

            for (const r of rows) {
                if (!r.name) { showToast('请填写所有选手名', 'error'); return; }
                if (isNaN(r.value)) { showToast(`「${r.name}」积分无效`, 'error'); return; }
            }

            const existing = allRecords.filter(r => r.play_date === dateVal);
            const dupNames = rows.filter(r => existing.some(e => e.player === r.name)).map(r => r.name);
            if (dupNames.length > 0) {
                showToast(`「${dupNames.join('、')}」在 ${dateVal} 已有记录`, 'error');
                return;
            }

            domSubmitBtn.disabled = true;
            domSubmitBtn.innerHTML = '<i class="fa-solid fa-spinner fa-spin mr-1.5"></i>提交中...';

            const { error } = await supabase.from(TABLE_NAME).insert(
                rows.map(r => ({ player: r.name, value: r.value, play_date: dateVal }))
            );

            domSubmitBtn.disabled = false;
            domSubmitBtn.innerHTML = '<i class="fa-solid fa-check mr-1.5"></i>一键提交';

            if (error) {
                showToast('提交失败: ' + error.message, 'error');
                return;
            }

            showToast(`成功录入 ${rows.length} 条记录`);
            domPlayerRows.innerHTML = '';
            for (let i = 0; i < 6; i++) domPlayerRows.appendChild(createPlayerRow());
            await fetchRecords();
        });

        // ── Enter key to submit login ──
        domLoginPassword.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') domLoginBtn.click();
        });

        // ── Init ──
        async function init() {
            initSupabase();

            // Check existing session
            const { data: { session } } = await supabase.auth.getSession();
            if (session) {
                showAdminView(session.user);
            } else {
                showLoginView();
            }
        }

        function escHtml(str) {
            const div = document.createElement('div');
            div.textContent = String(str);
            return div.innerHTML;
        }

        document.addEventListener('DOMContentLoaded', init);
    })();
    </script>
</body>
</html>
